# PIPELINE DEFINITION
# Name: customer-event-pipeline
# Description: Extract Chicago taxi data -> feature engineering -> LinearRegression training
# Inputs:
#    project: str
#    row_limit: int [Default: 50000.0]
#    target_col: str [Default: 'fare']
#    test_size: float [Default: 0.2]
components:
  comp-extract-component:
    executorLabel: exec-extract-component
    inputDefinitions:
      parameters:
        project:
          parameterType: STRING
        row_limit:
          defaultValue: 50000.0
          isOptional: true
          parameterType: NUMBER_INTEGER
    outputDefinitions:
      artifacts:
        output_csv:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
  comp-train-component:
    executorLabel: exec-train-component
    inputDefinitions:
      artifacts:
        dataset:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
      parameters:
        random_state:
          defaultValue: 42.0
          isOptional: true
          parameterType: NUMBER_INTEGER
        target_col:
          defaultValue: fare
          isOptional: true
          parameterType: STRING
        test_size:
          defaultValue: 0.2
          isOptional: true
          parameterType: NUMBER_DOUBLE
    outputDefinitions:
      artifacts:
        metrics_artifact:
          artifactType:
            schemaTitle: system.Metrics
            schemaVersion: 0.0.1
        model_artifact:
          artifactType:
            schemaTitle: system.Model
            schemaVersion: 0.0.1
  comp-transform-component:
    executorLabel: exec-transform-component
    inputDefinitions:
      artifacts:
        input_csv:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
    outputDefinitions:
      artifacts:
        output_dataset:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
deploymentSpec:
  executors:
    exec-extract-component:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - extract_component
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'google-cloud-bigquery[pandas]>=3.25.0'\
          \ 'pyarrow>=16.0.0'  &&  python3 -m pip install --quiet --no-warn-script-location\
          \ 'kfp==2.16.1' '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"\
          3.9\"' && \"$0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef extract_component(\n    project: str,\n    output_csv: Output[Dataset],\n\
          \    row_limit: int = 50000,\n) -> None:\n    from google.cloud import bigquery\n\
          \n    client = bigquery.Client(project=project)\n\n    query = f\"\"\"\n\
          \        SELECT\n            taxi_id,\n            trip_seconds,\n     \
          \       trip_miles,\n            fare,\n            tips,\n            tolls,\n\
          \            extras,\n            trip_total,\n            pickup_community_area,\n\
          \            dropoff_community_area\n        FROM `bigquery-public-data.chicago_taxi_trips.taxi_trips`\n\
          \        WHERE trip_seconds IS NOT NULL\n          AND trip_miles IS NOT\
          \ NULL\n          AND fare IS NOT NULL\n          AND fare > 0\n       \
          \   AND trip_seconds > 0\n          AND trip_miles > 0\n        LIMIT {row_limit}\n\
          \    \"\"\"\n\n    df = client.query(query).to_dataframe()\n    df.to_csv(output_csv.path,\
          \ index=False)\n    print(f\"Extracted {len(df)} rows to {output_csv.path}\"\
          )\n\n"
        image: python:3.11-slim
    exec-train-component:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - train_component
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'pandas>=2.2.0'\
          \ 'scikit-learn>=1.5.0' 'joblib>=1.4.0'  &&  python3 -m pip install --quiet\
          \ --no-warn-script-location 'kfp==2.16.1' '--no-deps' 'typing-extensions>=3.7.4,<5;\
          \ python_version<\"3.9\"' && \"$0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef train_component(\n    dataset: Input[Dataset],\n    model_artifact:\
          \ Output[Model],\n    metrics_artifact: Output[Metrics],\n    target_col:\
          \ str = \"fare\",\n    test_size: float = 0.2,\n    random_state: int =\
          \ 42,\n) -> None:\n    import json\n    import joblib\n    import pandas\
          \ as pd\n    from sklearn.linear_model import LinearRegression\n    from\
          \ sklearn.model_selection import train_test_split\n    from sklearn.metrics\
          \ import mean_absolute_error, mean_squared_error, r2_score\n    from sklearn.preprocessing\
          \ import StandardScaler\n    from sklearn.pipeline import Pipeline\n   \
          \ import math\n\n    df = pd.read_csv(dataset.path)\n\n    feature_cols\
          \ = [c for c in df.columns if c != target_col]\n    X = df[feature_cols].fillna(0)\n\
          \    y = df[target_col]\n\n    X_train, X_test, y_train, y_test = train_test_split(\n\
          \        X, y, test_size=test_size, random_state=random_state\n    )\n\n\
          \    pipe = Pipeline([\n        (\"scaler\", StandardScaler()),\n      \
          \  (\"regressor\", LinearRegression()),\n    ])\n    pipe.fit(X_train, y_train)\n\
          \n    y_pred = pipe.predict(X_test)\n    mae = mean_absolute_error(y_test,\
          \ y_pred)\n    rmse = math.sqrt(mean_squared_error(y_test, y_pred))\n  \
          \  r2 = r2_score(y_test, y_pred)\n\n    print(f\"MAE={mae:.4f}  RMSE={rmse:.4f}\
          \  R2={r2:.4f}\")\n\n    metrics_artifact.log_metric(\"mae\", mae)\n   \
          \ metrics_artifact.log_metric(\"rmse\", rmse)\n    metrics_artifact.log_metric(\"\
          r2\", r2)\n    metrics_artifact.log_metric(\"train_rows\", len(X_train))\n\
          \    metrics_artifact.log_metric(\"test_rows\", len(X_test))\n\n    joblib.dump(pipe,\
          \ model_artifact.path)\n\n    model_artifact.metadata[\"framework\"] = \"\
          scikit-learn\"\n    model_artifact.metadata[\"model_type\"] = \"LinearRegression\"\
          \n    model_artifact.metadata[\"feature_columns\"] = json.dumps(feature_cols)\n\
          \    model_artifact.metadata[\"target_column\"] = target_col\n    model_artifact.metadata[\"\
          mae\"] = mae\n    model_artifact.metadata[\"rmse\"] = rmse\n    model_artifact.metadata[\"\
          r2\"] = r2\n\n"
        image: python:3.11-slim
    exec-transform-component:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - transform_component
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'pandas>=2.2.0'\
          \  &&  python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.1'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef transform_component(\n    input_csv: Input[Dataset],\n    output_dataset:\
          \ Output[Dataset],\n) -> None:\n    import pandas as pd\n\n    df = pd.read_csv(input_csv.path)\n\
          \n    df[\"trip_duration_min\"] = df[\"trip_seconds\"] / 60.0\n    df[\"\
          avg_fare_per_mile\"] = df.apply(\n        lambda r: r[\"fare\"] / r[\"trip_miles\"\
          ] if r[\"trip_miles\"] > 0 else 0.0,\n        axis=1,\n    )\n    df[\"\
          avg_fare_per_min\"] = df.apply(\n        lambda r: r[\"fare\"] / r[\"trip_duration_min\"\
          ]\n        if r[\"trip_duration_min\"] > 0\n        else 0.0,\n        axis=1,\n\
          \    )\n    df[\"tip_rate\"] = df.apply(\n        lambda r: r[\"tips\"]\
          \ / r[\"fare\"] if r[\"fare\"] > 0 else 0.0, axis=1\n    )\n\n    df[\"\
          pickup_community_area\"] = df[\"pickup_community_area\"].fillna(0)\n   \
          \ df[\"dropoff_community_area\"] = df[\"dropoff_community_area\"].fillna(0)\n\
          \n    feature_cols = [\n        \"trip_duration_min\",\n        \"trip_miles\"\
          ,\n        \"avg_fare_per_mile\",\n        \"avg_fare_per_min\",\n     \
          \   \"tip_rate\",\n        \"pickup_community_area\",\n        \"dropoff_community_area\"\
          ,\n        \"fare\",\n    ]\n    df_out = df[feature_cols].dropna()\n\n\
          \    # clip extreme outliers (top 1%)\n    for col in [\"trip_duration_min\"\
          , \"trip_miles\", \"avg_fare_per_mile\", \"avg_fare_per_min\"]:\n      \
          \  upper = df_out[col].quantile(0.99)\n        df_out = df_out[df_out[col]\
          \ <= upper]\n\n    df_out.to_csv(output_dataset.path, index=False)\n   \
          \ print(f\"Transformed dataset: {len(df_out)} rows, columns: {list(df_out.columns)}\"\
          )\n\n"
        image: python:3.11-slim
pipelineInfo:
  description: Extract Chicago taxi data -> feature engineering -> LinearRegression
    training
  name: customer-event-pipeline
root:
  dag:
    tasks:
      extract-component:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-extract-component
        inputs:
          parameters:
            project:
              componentInputParameter: project
            row_limit:
              componentInputParameter: row_limit
        taskInfo:
          name: Extract from BigQuery
      train-component:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-train-component
        dependentTasks:
        - transform-component
        inputs:
          artifacts:
            dataset:
              taskOutputArtifact:
                outputArtifactKey: output_dataset
                producerTask: transform-component
          parameters:
            target_col:
              componentInputParameter: target_col
            test_size:
              componentInputParameter: test_size
        taskInfo:
          name: Train LinearRegression
      transform-component:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-transform-component
        dependentTasks:
        - extract-component
        inputs:
          artifacts:
            input_csv:
              taskOutputArtifact:
                outputArtifactKey: output_csv
                producerTask: extract-component
        taskInfo:
          name: Transform & Feature Engineering
  inputDefinitions:
    parameters:
      project:
        parameterType: STRING
      row_limit:
        defaultValue: 50000.0
        isOptional: true
        parameterType: NUMBER_INTEGER
      target_col:
        defaultValue: fare
        isOptional: true
        parameterType: STRING
      test_size:
        defaultValue: 0.2
        isOptional: true
        parameterType: NUMBER_DOUBLE
schemaVersion: 2.1.0
sdkVersion: kfp-2.16.1
